# streams/ai-papers.yaml
#
# Weekly AI paper deep dives — picks 1-3 recent papers under one honest
# umbrella from the last 30 days of Hugging Face Daily Papers, then writes
# a Socratic, dialectical analysis with intuition-first explanation, math
# where it adds insight, multiple verbatim quotes, and a closing demo that
# scientifically tests the central claim against a dummy dataset.
#
# Stage structure (H3 + H6 redesign — May 2026):
#   1. umbrella_opening           — opens with a vivid question and an
#                                   analogy from everyday life or another
#                                   scientific domain. Frames the umbrella
#                                   theme as a question, not a topic.
#   2. dialectical_walk           — main body. Walks through the papers as
#                                   one continuous Socratic dialogue:
#                                   claim -> counter-question -> answer ->
#                                   deeper question -> next paper's claim.
#                                   Each paper gets >=2 verbatim quotes,
#                                   key math, and a small illustrative
#                                   code block (rendered as a figure).
#   3. closing_demo_and_critique  — the honest scientific test. Apply the
#                                   general algorithm to a dummy dataset.
#                                   Plot the results. Comment honestly on
#                                   what worked, what didn't, and where
#                                   the experiment contradicts the paper's
#                                   claims.
#   4. honest_takeaway            — short closing prose. What does the
#                                   reader walk away with that's true?
#   5. tag_extraction             — metadata-only. Parsed for the post's
#                                   `tags:` frontmatter, not included in
#                                   the body.
#   6. cover_image_brief          — metadata-only. One-sentence visual
#                                   brief used by generate_cover.py to
#                                   prompt DALL-E 3 for the cover image.
#
# To pause this stream: set enabled to false, or move into streams/_disabled/.

stream:
  id: ai-papers
  name: "Weekly AI Paper Deep Dives"
  enabled: true
  language: "en"

schedule:
  cron: "17 0 * * 0"               # Sunday 00:17 UTC
  timezone: "Asia/Riyadh"          # informational; cron evaluated UTC

discovery:
  source: huggingface_daily_papers
  # Look back a full month so the umbrella selector has enough range to
  # find a coherent thematic group. The pre-H1 setting was 7 days, which
  # often produced "two unrelated bangers" rather than a thread.
  lookback_days: 30
  # Wider candidate pool than the pre-H1 setting (was 10). The umbrella
  # selector hard-caps how many it actually feeds to Claude
  # (MAX_CANDIDATES_FOR_SELECTION in select_papers.py), but anything past
  # that cap is still useful as a fallback if the dedup filter eats half
  # the top of the list on a slow week.
  top_n: 30
  filters:
    categories: []
    min_upvotes: 5
  selection:
    # claude_umbrella_picks: ask Claude to pick 2-3 papers under one
    # honest theme, OR fall back to a single best paper. The legacy
    # "claude_picks" / "count: N" behaviour is preserved in main.py for
    # any future stream that wants the older shape.
    method: claude_umbrella_picks
    # `count` is informational under claude_umbrella_picks — the selector
    # is hard-clamped to [1, 3] internally. We keep it here as a hint.
    count: 3
  # Append-only ledger of papers already shipped in past posts. The
  # discovery layer reads this and drops candidates that are already in
  # it, so the same paper is never written up twice. Updated by
  # discover_papers.mark_paper_as_used after write_post succeeds.
  dedup_state_file: pipeline-state/used-papers.json

content:
  output_path: "content/blog"
  slug_pattern: "{year}-W{week}-{topic-slug}"
  # Title prefix for posts in this stream. Future streams (history, logic,
  # etc.) define their own. Use {topic} as a placeholder for the first
  # paper's title (or a stream-relevant root for non-paper streams).
  title_template: "Paper Notes: {topic}"
  # Base tags merged with the dynamic `tag_extraction` output. Keep these
  # broad — specific tags come from per-post extraction.
  tags: ["AI", "weekly-paper"]

generation:
  model: "claude-sonnet-4-6"
  fallback_model: "claude-haiku-4-5"
  max_output_tokens: 16000

  # ----- Stages -----
  # Each stage is a separate Claude call with narrow scope. Output is
  # appended to the post body in the order listed below, except for stages
  # tagged `role: metadata` (those are parsed for frontmatter only, never
  # included in the body).
  stages:
    - name: umbrella_opening
      task: |
        Write a SHORT opening (~250-400 words) that frames the post as a
        QUESTION the reader and the papers are both asking.

        Voice rule for this stage: write as if continuing a conversation
        the reader has already started in their head. Your job is to
        sharpen the question they already half-feel, then promise an
        honest tour of how recent papers answer it.

        Structure:

        Paragraph 1 — A vivid, concrete entry point. Open with one of:
          - a familiar phenomenon from everyday life (cooking, traffic,
            biology, navigation, music)
          - a phenomenon from a DIFFERENT scientific domain (physics,
            evolution, statistics, signal processing)
          - a question the reader has likely asked themselves but
            doesn't have a name for
        Avoid jargon. Avoid the words "paper", "model", or "AI" in the
        first sentence — those should arrive in paragraph 2.

        Paragraph 2 — Name the umbrella. State the question that the
        selected paper(s) are reaching toward, in one sentence. Then
        introduce the papers themselves in plain language: 1-2 sentences
        per paper, framed as "this paper offers ONE answer to the
        question; that paper offers a DIFFERENT answer".
        For a single-paper post: introduce the paper as one sustained
        attempt at the question.

        Paragraph 3 — Tell the reader what they'll get from the post:
        which intuitions they'll leave with, which math will show up,
        which experiment you'll run at the end. Be specific: "by the
        end of this post you'll understand X, you'll have seen Y, and
        you'll have seen one experiment that tries to break it".

        Use a section heading (h2) that names the umbrella as a
        question, not a topic. Examples of good headings:
          ## When does inference-time scaling actually pay off?
          ## How do diffusion models learn what to leave alone?
          ## What does it mean for an agent to "remember" a tool?
        For a single-paper post the heading should still be a question
        that the paper is the candidate answer to.

    - name: dialectical_walk
      task: |
        Write the MAIN BODY of the post as one continuous Socratic
        dialectic across the selected paper(s). This is the place where
        most of the post's depth lives — aim for 1500-3000 words total
        across this stage. Length should follow what the papers
        actually require; do not pad.

        Structure: NOT one section per paper. Instead, weave the papers
        through a single argument that moves like this:

          (1) Restate the umbrella question from the opening, sharper.
          (2) Paper A's first claim — what does it propose as an answer?
              Use plain language first, then formalize.
          (3) Socratic question — the question a careful reader should
              ask after reading (2). Examples: "but does this hold when
              X?"  "how does the method behave at the boundary?"  "isn't
              this just a renaming of an older idea?"
          (4) Paper A's response in detail — including key math in $$...$$
              blocks ONLY where it adds insight, and at least 2 verbatim
              blockquotes from the paper's abstract or summary, attributed.
          (5) Limitation acknowledged — where Paper A's answer falls short.
          (6) IF a second / third paper exists in the umbrella: introduce
              it as the continuation of the dialectic, not as a separate
              paper. Phrase the transition like: "this is exactly where
              <Paper B> picks up the thread". Then repeat (2)-(5) for
              Paper B, with at least 2 verbatim quotes for each new paper.
          (7) Synthesis question — what's the deeper question both
              papers leave unresolved? State it clearly. Don't answer it
              yet (the closing demo will probe it).

        Rules for this stage:
          - Use h2 headings ONLY for the main act-breaks ("the question
            sharpens", "how Paper A answers", "where this answer
            breaks"). Do NOT use the paper title as a heading.
          - Use h3 sub-headings sparingly for the dialectical beats.
          - Verbatim quotes: at least 2 per paper, each as a markdown
            blockquote (`> ...`) with attribution on the next line.
          - Math: $$...$$ for display, $...$ for inline. Use ONLY when
            it sharpens the point — every equation should be earning
            its space.
          - Inline code spans (single backticks) when referring to a
            specific function name or variable. Do NOT include fenced
            code blocks (```python ... ```) here — runnable code lives
            in the closing demo stage.
          - Analogies: when introducing a hard concept, reach for an
            analogy from cooking, traffic, biology, evolution, signal
            processing, navigation, or another non-AI domain. One per
            new concept, no more.
          - DO NOT use the words "intuition", "actually works", or
            "honest critique" as section headings — those were the old
            template. Write headings that name the dialectic.

        For a SINGLE-PAPER post the structure is the same minus the
        Paper-B branch: setup question -> claim -> Socratic
        question -> response with quotes/math -> limitation ->
        deeper-question hand-off to the demo.

    - name: closing_demo_and_critique
      task: |
        Write the closing experimental section. This is the post's
        "scientific test" — apply the general algorithm or central
        idea to a dummy dataset, plot results scientifically, and
        comment honestly.

        Section heading: "## A test of the central claim"
        (or a more specific phrasing if the umbrella suggests one,
        e.g. "## What happens when we try this on a smaller problem?")

        Structure:

        Opening paragraph (~120 words) — Restate the deeper question
        the dialectical walk left open. Say what experiment you're
        running, what the experiment SHOULD show if the paper's central
        claim holds, and what it would show if the claim doesn't hold.
        Be explicit about the falsifier.

        Then the code in a single ```python fenced block (<=120 lines).

        Demo constraints (CRITICAL — the code is run in CI):
        - Allowed libraries: numpy, matplotlib, scipy, scikit-learn,
          seaborn. NEVER torch, tensorflow, transformers, or any GPU
          library.
        - Must produce at least 2 matplotlib figures. Save each with
          a descriptive filename (e.g. `comparison.png`,
          `convergence.png`).
        - DO NOT call plt.show() — figures are auto-saved by the runner.
        - Self-contained: no external files, no network calls, no input().
        - Runs in under 60 seconds on a CPU.

        EDITORIAL STYLE (auto-applied — DO NOT redefine):
        The runner pre-imports an editorial style pack so every figure
        you create automatically uses a warm off-white background, deep
        navy primary, and electric cobalt accent. The following names
        are already in scope when your code starts:

          - `figure(width=W, height=H)` -> returns (fig, ax) with the
            editorial style guaranteed to apply. Prefer this over
            `plt.subplots(...)`.
          - `PALETTE["ink"]`, `PALETTE["accent"]`, `PALETTE["muted"]`,
            `PALETTE["soft"]`, `PALETTE["warm"]`, `PALETTE["danger"]`,
            `PALETTE["background"]` — named hex colors. Use the rust
            `warm` and earthy `danger` SPARINGLY (one highlight per
            chart at most).
          - `lead_color(i)` -> i-th color from the editorial cycle.
          - `annotate_callout(ax, (x, y), "label")` -> editorial
            arrow + text annotation for highlighting one point.

        Plot quality bar:
        - Editorial / scientific-magazine quality, not a tutorial
          screenshot. Fewer colors, more whitespace, careful labeling.
        - Always set descriptive `set_xlabel`, `set_ylabel`,
          `set_title`. Never ship a chart without them.
        - Use seaborn (`import seaborn as sns`) for distributions, KDE
          plots, heatmaps, or pair plots when those communicate better
          than a line chart.

        Closing paragraph (200-400 words) — THIS IS THE KEY MOMENT.
        Interpret the results scientifically and HONESTLY:
          - State what the experiment showed in one sentence.
          - Compare it to what the paper(s) claimed.
          - If the experiment supports the claim, say so plainly and
            explain WHY this is a meaningful confirmation (not just a
            "we got the same numbers because we used the same setup").
          - If the experiment contradicts the claim — say so plainly.
            Don't apologize for the paper. Don't excuse the result.
            Explain what the discrepancy might mean: a hidden
            assumption, an overstated generalization, a regime where
            the method does not apply.
          - If the experiment is inconclusive, say that too. "I'd need
            a larger sample / longer runtime / different metric to
            tell" is a valid honest closing.

        Do NOT add a final "but the paper is still important" softener
        if the experiment contradicted the claim. The reader can hold
        both ideas at once.

    - name: honest_takeaway
      task: |
        Write the closing prose section. ~200-400 words.

        Section heading: "## What to take away"

        ONE paragraph, no subheadings. Answer:
          - What is the smallest, truest sentence the reader should
            leave the post with?
          - What is one thing this post did NOT settle (and why that's
            OK)?
          - What is one direction a curious reader could pursue next —
            either another paper, a question worth running an
            experiment on, or a connection to a different field?

        Voice rule: as if you were closing a long conversation with a
        colleague, not as if you were writing a textbook conclusion.
        Concise, slightly informal, but never self-important.

        CRITICAL — NO CODE BLOCKS IN THIS SECTION:
        - Do NOT include any ```python or ```text or ```bash fenced
          code blocks. The runnable demo lives in the previous stage.
          Repeating code here creates a duplicate demo section that
          confuses the reader and breaks the post layout.
        - Inline code spans (single backticks, like `softmax`) are
          fine when referring to a specific function or variable name.
        - Do NOT use hype phrases like "paradigm shift", "revolutionary",
          "groundbreaking", or "game-changer".

    - name: tag_extraction
      role: metadata             # NOT included in post body
      task: |
        Output ONLY a single line of 3 to 5 specific, kebab-case tags
        describing the technical topics of this post. Tags should reflect
        the actual papers' subfields and methods, NOT generic terms.

        Format: one line, comma-separated, lowercase, hyphens for
        multi-word tags. NO other text, NO heading, NO explanation.

        Good examples: "multi-agent-systems, latent-space-coordination, recursive-computation"
        Bad: "AI, machine learning, weekly-paper" (too generic)
        Bad: "Multi-Agent Systems, RL" (wrong format)

        Output the line and nothing else.

    - name: cover_image_brief
      role: metadata             # NOT included in post body
      task: |
        Write ONE sentence describing the abstract scene that should appear
        on the cover image for this post. The image goes at the top of the
        blog page as a 16:9 editorial illustration — like the cover of a
        research magazine.

        Constraints:
          - One sentence only. 25 words maximum.
          - Be VISUAL. Describe shapes, textures, composition — not the
            paper's title, not technical jargon. Translate the central
            idea into an image a designer could draw.
          - Do NOT mention text, words, letters, captions, or labels.
            (DALL-E will render garbled text otherwise.)
          - Do NOT name a real person, brand, or copyrighted character.
          - Avoid hype words like "revolutionary" or "powerful" — they
            don't help an illustrator.

        The pipeline appends a fixed style suffix automatically (minimal,
        warm off-white background, deep navy, single cobalt accent, no
        text). Don't repeat that — focus only on the SUBJECT of the image.

        Good example (multi-agent paper): "Three abstract glowing nodes
        passing translucent threads of light to each other across an
        empty grid, with a faint orbit pattern around them."
        Bad example: "An illustration about agentic AI systems."
        Bad example: "A cover image for our paper on multi-agent RL."

        Output the sentence and nothing else.

  system_prompt: |
    You are a technical writer for a portfolio blog by an engineer who
    values rigor, clarity, and honest investigation. Your readers are
    working engineers and applied researchers — many are NOT specialists
    in the paper's subfield. Your job is to make rigorous AI/ML papers
    reachable for a smart engineer in an adjacent area, without dumbing
    down, AND to test the papers' claims rather than just summarize them.

    Voice rules — Socratic dialectic:
      1. THE POST IS A CONVERSATION. Every section either asks a question
         the reader is half-thinking, or answers one the previous section
         raised. Never present claims as a flat list. Always tee up the
         next thought.
      2. CLAIM THEN COUNTER-QUESTION. After every significant claim
         (the paper's central method, an empirical result, a theoretical
         bound), pose the question a careful reader would ask next.
         Then answer it. This is the rhythm of the post.
      3. ANALOGIES FROM ELSEWHERE. When introducing a concept that's hard
         in isolation, reach for an analogy from cooking, traffic,
         biology, evolution, signal processing, navigation, or any
         non-AI scientific domain. One analogy per new concept. Do not
         pile analogies — they cancel each other out.
      4. INTUITION FIRST, MATH SECOND. Before any equation, the reader
         should know what problem the math solves and why a non-specialist
         should care. Math goes in $$...$$ blocks for display and $...$
         inline. Use math ONLY when it adds insight; never for decoration.
      5. SHOW, DON'T SUMMARIZE. Anchor claims to specific section numbers
         when you can, verbatim quotes from the paper, and concrete code.
         At least 2 verbatim blockquotes per paper, each wrapped as
         `> ...` with attribution on the following line.
      6. NO INVENTION. Never fabricate quotes, authors, results, or
         section numbers. If you cannot find it in the paper, say so
         explicitly. A clearly incomplete answer is more valuable than a
         confidently wrong one.
      7. CODE THAT RUNS. The closing demo executes in CI on Python 3.10+
         with numpy / matplotlib / scipy / scikit-learn / seaborn. NO
         other libraries. CPU only. Under 60 seconds wall time. The
         editorial style pack is auto-imported — use `figure()`,
         `PALETTE`, `lead_color()`, `annotate_callout()` instead of
         redefining colors.
      8. THE HONEST SCIENTIST POSTURE. The closing demo is your chance
         to TEST the central claim, not validate it. If the experiment
         contradicts what the paper says, write that contradiction
         plainly. Don't soften it with "but the paper is still
         important". The reader can hold both ideas at once.
      9. CONNECT HONESTLY. If two papers share a real thematic thread,
         name it and weave them. If they don't share one, the umbrella
         selector should not have grouped them — flag this as a problem
         and treat each on its own terms.
     10. NO HYPE. Avoid "revolutionary", "paradigm shift", "game-changer",
         "groundbreaking", "powerful", "state-of-the-art" as a stand-alone
         adjective. Let the work speak for itself. Hedged language is
         fine and often more honest.
     11. LENGTH FOLLOWS DEPTH. There is no artificial cap. A short
         honest section beats a long padded one. The dialectical walk
         can run 1500-3000 words; the closing prose should stay tight.
     12. NEVER OVERRIDE A PRIOR STAGE. The pipeline runs each stage as a
         separate call. Build on what earlier stages wrote — don't
         restate the opening at the start of the dialectic, don't
         restate the dialectic at the start of the closing demo. Earlier
         output is appended to your prompt as context; trust it.

demo:
  enabled: true
  output_dir: "public/blog-images/{slug}"
  on_failure: "strip_demo_section"

# DALL-E 3 cover image (C6 — May 2026).
# Each generated post gets a cover rendered from the `cover_image_brief`
# stage above. The image is saved to public/blog-images/<slug>/cover.png and
# the file path is written into the post's frontmatter as `coverImage:`.
# Cost (DALL-E 3, May 2026): 1792x1024 standard = $0.08 / image,
# 1792x1024 HD = $0.12 / image. We use HD: ~$6.24/year at one cover/week,
# crisper lines and cleaner edges (closer to the vector look we want).
cover_image:
  enabled: true
  model: "dall-e-3"
  size: "1792x1024"                 # landscape — matches the blog header aspect
  quality: "hd"                     # HD: crisper lines, closer to vector look (+$0.04/img)
  style: "natural"                  # "vivid" pushes more saturation; we don't want that
  output_dir: "public/blog-images/{slug}"

quality_gates:
  build_validation: true
  require_verbatim_quotes: 2       # at least 2 quoted blocks per paper
