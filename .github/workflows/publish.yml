name: publish

# ---------------------------------------------------------------------------
# Trigger configuration
# ---------------------------------------------------------------------------
#
# This workflow is currently **manual-only** for testing. To run the pipeline,
# go to the Actions tab → "publish" → "Run workflow".
#
# When you're confident the pipeline is healthy and you want to go back to
# automatic weekly publishing, uncomment the `schedule:` block below. The
# tick-rate determines the *resolution* — the per-stream cron in
# streams/*.yaml decides what actually runs. A 30-minute tick combined with
# a "Sunday 10:00 Riyadh" stream cron means the pipeline checks every 30 min
# whether the Sunday-10:00 slot is in the current window.
#
# To go back to weekly automatic publishing:
#   1. Uncomment the `schedule:` block.
#   2. Make sure your stream's cron (e.g. ai-papers.yaml: schedule.cron) is
#      set to "0 7 * * 0"  (= 10:00 Riyadh = 07:00 UTC, every Sunday).
#
on:
  schedule:
    - cron: "*/30 * * * *"   # Tick every 30 min; per-stream cron decides what runs.
  workflow_dispatch:
    inputs:
      stream_id:
        description: "Run only this stream id (skips cron check). Leave blank to run all DUE streams (which, on a manual run, may be none)."
        required: false
        default: "ai-papers"
      dry_run:
        description: "Discover papers and print the plan, but don't call the model or write files."
        required: false
        default: "false"

# One run at a time. We don't want two parallel runs both producing
# YYYY-W18-<topic>.mdx with different content.
concurrency:
  group: publish
  cancel-in-progress: false

permissions:
  contents: write        # push the auto/<stream>/<slug> branch
  pull-requests: write   # open the PR + enable auto-merge
  issues: write          # open a failure issue if the pipeline crashes

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # peter-evans/create-pull-request needs full history

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install Node dependencies
        run: pnpm install --frozen-lockfile

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: scripts/requirements.txt

      - name: Install Python dependencies
        run: pip install -r scripts/requirements.txt

      - name: Run pipeline
        id: pipeline
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          # OpenAI is used by scripts/generate_cover.py for DALL-E 3 cover
          # images. If the secret is unset, generate_cover.py logs a warning
          # and the post ships without a cover — non-fatal.
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          set +e
          ARGS="--output-summary run-summary.json"
          if [ -n "${{ github.event.inputs.stream_id }}" ]; then
            ARGS="$ARGS --stream ${{ github.event.inputs.stream_id }}"
          fi
          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
            ARGS="$ARGS --dry-run"
          fi
          echo "Running: python scripts/main.py $ARGS"
          python scripts/main.py $ARGS
          ec=$?
          echo "exit_code=$ec" >> "$GITHUB_OUTPUT"
          echo "Pipeline exit code: $ec"
          # Exit codes:
          #   0 = clean success (or nothing was due)
          #   1 = fatal error (the rest of the workflow handles this with `if: failure()`)
          #   2 = soft fail: a quality gate flagged the post; we still open the PR
          #       but with a label and no auto-merge.
          if [ "$ec" -eq 1 ]; then
            exit 1
          fi
          exit 0

      - name: Inspect run summary
        id: summary
        if: always() && hashFiles('run-summary.json') != ''
        run: |
          python - <<'PY'
          import json, os, pathlib
          data = json.loads(pathlib.Path("run-summary.json").read_text())
          # Pick the first stream that produced a post (status 'ok' or 'flagged').
          # We open at most one PR per workflow run; multiple-stream scenarios
          # are vanishingly rare in practice and easier to debug as separate runs.
          posted = next((s for s in data if s.get("status") in {"ok", "flagged"}), None)

          def _fmt_cost(v):
              # main.py emits cost_usd as a float (or None if the meter never
              # initialized). Format to 4 decimals — the email template wraps
              # it in `$...`. Empty string means "not tracked", which the
              # email's fallback expression renders as "(not tracked)".
              if v is None:
                  return ""
              try:
                  return f"{float(v):.4f}"
              except (TypeError, ValueError):
                  return ""

          # Total spend across every stream the run touched. Useful for the
          # failure email path even when no post shipped (e.g. cost_aborted).
          total_cost = sum(
              float(s.get("cost_usd") or 0) for s in data
              if isinstance(s.get("cost_usd"), (int, float))
          )

          out = pathlib.Path(os.environ["GITHUB_OUTPUT"])
          with out.open("a") as f:
              # Always emit total_cost_usd so failure emails / debug logs can
              # see how much was burned even when no post was produced.
              f.write(f"total_cost_usd={total_cost:.4f}\n")
              if not posted:
                  f.write("has_post=false\n")
              else:
                  f.write("has_post=true\n")
                  f.write(f"stream_id={posted['stream_id']}\n")
                  f.write(f"stream_name={posted['stream_name']}\n")
                  f.write(f"slug={posted['slug']}\n")
                  f.write(f"status={posted['status']}\n")
                  build_failed = posted.get("build", {}).get("ran") and not posted["build"].get("success")
                  quote_failed = posted.get("quote_check_failed", False)
                  f.write(f"build_failed={'true' if build_failed else 'false'}\n")
                  f.write(f"quote_failed={'true' if quote_failed else 'false'}\n")
                  # Auto-merge eligibility: only when nothing was flagged.
                  f.write(f"auto_merge={'true' if posted['status'] == 'ok' else 'false'}\n")
                  # Cost recorded by scripts/cost_meter.py during this stream.
                  # Empty string -> success email shows "(not tracked)".
                  f.write(f"cost_usd={_fmt_cost(posted.get('cost_usd'))}\n")
                  ceiling = posted.get("cost_ceiling_usd")
                  if ceiling is not None:
                      f.write(f"cost_ceiling_usd={_fmt_cost(ceiling)}\n")
          PY

      - name: Read post title for PR
        id: post
        if: steps.summary.outputs.has_post == 'true'
        run: |
          python - <<'PY'
          import os, pathlib, re
          slug = os.environ["SLUG"]
          stream_id = os.environ["STREAM_ID"]
          mdx_path = pathlib.Path("content/blog") / f"{slug}.mdx"
          text = mdx_path.read_text(encoding="utf-8")
          m = re.search(r'^title:\s*"([^"]+)"', text, re.MULTILINE)
          title = m.group(1) if m else slug
          out = pathlib.Path(os.environ["GITHUB_OUTPUT"])
          with out.open("a") as f:
              f.write(f"title={title}\n")
              f.write(f"branch=auto/{stream_id}/{slug}\n")
          PY
        env:
          SLUG: ${{ steps.summary.outputs.slug }}
          STREAM_ID: ${{ steps.summary.outputs.stream_id }}

      - name: Create pull request
        id: cpr
        if: steps.summary.outputs.has_post == 'true'
        uses: peter-evans/create-pull-request@v8
        with:
          branch: ${{ steps.post.outputs.branch }}
          base: main
          commit-message: "[${{ steps.summary.outputs.stream_id }}] ${{ steps.post.outputs.title }}"
          title: "[${{ steps.summary.outputs.stream_name }}] ${{ steps.post.outputs.title }}"
          body: |
            **Auto-generated post** from the `${{ steps.summary.outputs.stream_name }}` stream.

            - **Slug:** `${{ steps.summary.outputs.slug }}`
            - **Status:** `${{ steps.summary.outputs.status }}`
            - **Quality gates:** build_failed=`${{ steps.summary.outputs.build_failed }}`, quote_check_failed=`${{ steps.summary.outputs.quote_failed }}`

            If `status: ok` and the Vercel preview build is green, this PR will auto-merge.
            If a quality gate flagged the post, auto-merge is **disabled** and the PR is labelled — review and merge manually.

            Run summary attached as `run-summary.json` artifact.
          labels: |
            auto-generated
            ${{ steps.summary.outputs.build_failed == 'true' && 'build-failed' || '' }}
            ${{ steps.summary.outputs.quote_failed == 'true' && 'quote-check-failed' || '' }}
          delete-branch: true

      - name: Enable auto-merge
        if: steps.cpr.outputs.pull-request-number && steps.summary.outputs.auto_merge == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr merge ${{ steps.cpr.outputs.pull-request-number }} \
            --auto \
            --squash \
            --repo ${{ github.repository }}

      - name: Upload run summary
        if: always() && hashFiles('run-summary.json') != ''
        uses: actions/upload-artifact@v4
        with:
          name: run-summary
          path: run-summary.json
          retention-days: 30

      # ---- Success email: a post was generated and a PR was opened ----
      #
      # Sends a short notification when the pipeline produced a post. We send
      # this on PR-creation, not on merge, so you can review the PR while the
      # email is still fresh. If you'd rather be notified on merge instead,
      # move this step into a separate workflow listening on `pull_request`
      # closed-with-merged.
      - name: Send success email
        if: success() && steps.summary.outputs.has_post == 'true'
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          secure: true
          username: ${{ secrets.GMAIL_USER }}
          password: ${{ secrets.GMAIL_APP_PASSWORD }}
          from: "Portfolio Pipeline <${{ secrets.GMAIL_USER }}>"
          to: ${{ secrets.GMAIL_USER }}
          subject: "[portfolio] New post: ${{ steps.post.outputs.title }}"
          body: |
            A new post was just generated by the publish pipeline.

            Title:    ${{ steps.post.outputs.title }}
            Stream:   ${{ steps.summary.outputs.stream_name }}
            Slug:     ${{ steps.summary.outputs.slug }}
            Status:   ${{ steps.summary.outputs.status }}
            Cost:     ${{ steps.summary.outputs.cost_usd != '' && format('${0}', steps.summary.outputs.cost_usd) || '(not tracked)' }}

            Pull request: ${{ steps.cpr.outputs.pull-request-url }}
            Workflow run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

            If status is "ok", auto-merge will fire once the Vercel preview is green.
            If status is "flagged", a quality gate caught something — review the PR
            manually before merging.

      # ---- Failure path: pipeline crashed (exit code 1) ----------------
      - name: Prepare failure issue body
        if: failure()
        run: |
          {
            echo "The publish pipeline failed at $(date -u +%FT%TZ)."
            echo ""
            echo "**Workflow run:** ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
            echo ""
            echo "Exit code: \`${{ steps.pipeline.outputs.exit_code }}\`"
            echo ""
            if [ -f run-summary.json ]; then
              echo "## Run summary"
              echo ""
              echo '```json'
              cat run-summary.json
              echo '```'
            else
              echo "_No run-summary.json was produced — the pipeline likely crashed before writing it._"
            fi
          } > failure-body.md

      - name: Open failure issue
        if: failure()
        uses: peter-evans/create-issue-from-file@v5
        with:
          title: "publish pipeline failed (run ${{ github.run_id }})"
          content-filepath: failure-body.md
          labels: |
            pipeline-failure
            auto-generated

      - name: Send failure email
        if: failure()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          secure: true
          username: ${{ secrets.GMAIL_USER }}
          password: ${{ secrets.GMAIL_APP_PASSWORD }}
          from: "Portfolio Pipeline <${{ secrets.GMAIL_USER }}>"
          to: ${{ secrets.GMAIL_USER }}
          subject: "[portfolio] Pipeline FAILED (run ${{ github.run_id }})"
          body: |
            The publish pipeline failed.

            Workflow run:   ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
            Pipeline exit:  ${{ steps.pipeline.outputs.exit_code }}
            Triggered by:   ${{ github.event_name }} (${{ github.actor }})

            A failure issue has been opened with the run summary attached.
            Click the workflow run link above to see logs.

            If the failure was the cost-ceiling abort, the run summary will
            tell you which stage tripped the limit and what the cumulative
            cost was at that point. Re-running the workflow will start a
            fresh run from zero.
