name: project-publish

on:
  schedule:
    - cron: "*/30 * * * *"   # Tick every 30 min; per-stream cron decides.
  workflow_dispatch:
    inputs:
      paper_url:
        description: "Override: specific paper URL to implement (leave blank for auto-discover)"
        required: false
        default: ""
      dry_run:
        description: "Discover + plan only, don't generate"
        required: false
        default: "false"

concurrency:
  group: project-publish
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: scripts/requirements.txt

      - name: Install Python dependencies
        run: pip install -r scripts/requirements.txt

      - name: Add project-specific deps
        run: |
          pip install anthropic openai pyyaml pydantic requests

      - name: Run project pipeline
        id: pipeline
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set +e
          ARGS="--output-summary project-run-summary.json"
          if [ -n "${{ github.event.inputs.paper_url }}" ]; then
            ARGS="$ARGS --paper-url ${{ github.event.inputs.paper_url }}"
          fi
          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
            ARGS="$ARGS --dry-run"
          fi
          echo "Running: python scripts/project_pipeline.py $ARGS"
          python scripts/project_pipeline.py $ARGS
          ec=$?
          echo "exit_code=$ec" >> "$GITHUB_OUTPUT"
          if [ "$ec" -eq 1 ]; then
            exit 1
          fi

      - name: Inspect run summary
        id: summary
        if: always() && hashFiles('project-run-summary.json') != ''
        run: |
          python - <<'PY'
          import json, os, pathlib
          data = json.loads(pathlib.Path("project-run-summary.json").read_text())
          entry = next((s for s in data if s.get("status") in {"ok", "dry_run"}), None)
          out = pathlib.Path(os.environ["GITHUB_OUTPUT"])
          with out.open("a") as f:
              if not entry:
                  f.write("has_project=false\n")
              else:
                  f.write("has_project=true\n")
                  f.write(f"status={entry['status']}\n")
                  f.write(f"project_name={entry.get('project_name', '')}\n")
                  f.write(f"slug={entry.get('slug', '')}\n")
                  f.write(f"repo_url={entry.get('repo_url', '')}\n")
                  f.write(f"figure_count={entry.get('figure_count', 0)}\n")
                  f.write(f"cost_usd={entry.get('cost_usd', 0)}\n")
          PY

      - name: Create pull request (if project page was generated)
        id: cpr
        if: steps.summary.outputs.has_project == 'true' && steps.summary.outputs.status == 'ok'
        uses: peter-evans/create-pull-request@v8
        with:
          branch: auto/projects/${{ steps.summary.outputs.slug }}
          base: main
          commit-message: "[projects] ${{ steps.summary.outputs.project_name }}"
          title: "[Projects] ${{ steps.summary.outputs.project_name }}"
          body: |
            **Auto-generated project implementation.**

            - **Project:** ${{ steps.summary.outputs.project_name }}
            - **Repository:** ${{ steps.summary.outputs.repo_url }}
            - **Figures produced:** ${{ steps.summary.outputs.figure_count }}
            - **Cost:** $${{ steps.summary.outputs.cost_usd }}

            This PR adds the project page to the portfolio.
            The project code lives in its own repository (linked above).
          labels: auto-generated, project
          delete-branch: true

      - name: Enable auto-merge
        if: steps.cpr.outputs.pull-request-number && steps.summary.outputs.status == 'ok'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr merge ${{ steps.cpr.outputs.pull-request-number }} \
            --auto --squash \
            --repo ${{ github.repository }}

      - name: Upload run summary
        if: always() && hashFiles('project-run-summary.json') != ''
        uses: actions/upload-artifact@v4
        with:
          name: project-run-summary
          path: project-run-summary.json
          retention-days: 30

      - name: Send success email
        if: success() && steps.summary.outputs.has_project == 'true' && steps.summary.outputs.status == 'ok'
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          secure: true
          username: ${{ secrets.GMAIL_USER }}
          password: ${{ secrets.GMAIL_APP_PASSWORD }}
          from: "Portfolio Pipeline <${{ secrets.GMAIL_USER }}>"
          to: ${{ secrets.GMAIL_USER }}
          subject: "[portfolio] New project: ${{ steps.summary.outputs.project_name }}"
          body: |
            A new project was auto-generated.

            Project:  ${{ steps.summary.outputs.project_name }}
            Repo:     ${{ steps.summary.outputs.repo_url }}
            Figures:  ${{ steps.summary.outputs.figure_count }}
            Cost:     $${{ steps.summary.outputs.cost_usd }}

            A PR has been opened. Auto-merge will fire once the build is green.

      - name: Send failure email
        if: failure()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          secure: true
          username: ${{ secrets.GMAIL_USER }}
          password: ${{ secrets.GMAIL_APP_PASSWORD }}
          from: "Portfolio Pipeline <${{ secrets.GMAIL_USER }}>"
          to: ${{ secrets.GMAIL_USER }}
          subject: "[portfolio] Project pipeline FAILED (run ${{ github.run_id }})"
          body: |
            The project pipeline failed.

            Workflow run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
            Triggered by: ${{ github.event_name }} (${{ github.actor }})
